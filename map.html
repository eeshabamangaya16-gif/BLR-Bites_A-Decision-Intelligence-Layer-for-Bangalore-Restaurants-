<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLR Bites | Map</title>
  <meta name="description" content="Explore Bangalore food spots through a full-screen interactive BLR Bites map.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="map">
  <div class="page-shell page-shell-map">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="BLR Bites home">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" role="img">
            <circle cx="32" cy="32" r="30" fill="#f3e8d7"></circle>
            <path d="M16 39c2-10 10-17 16-17s14 7 16 17" fill="none" stroke="#b46d53" stroke-linecap="round" stroke-linejoin="round" stroke-width="4"></path>
            <path d="M14 43h36" fill="none" stroke="#8d533f" stroke-linecap="round" stroke-width="4"></path>
            <path d="M30 19c0-2 1-4 2-4s2 2 2 4" fill="none" stroke="#76805b" stroke-linecap="round" stroke-width="4"></path>
            <path d="M24 26l-5 6" fill="none" stroke="#cea549" stroke-linecap="round" stroke-width="4"></path>
            <path d="M40 26l5 6" fill="none" stroke="#cea549" stroke-linecap="round" stroke-width="4"></path>
          </svg>
        </span>
        <span class="brand-copy">
          <strong>BLR Bites</strong>
          <small>Decision intelligence</small>
        </span>
      </a>

      <nav class="site-nav" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a class="active" href="map.html">Map</a>
        <a href="plan-day.html">Plan Day</a>
        <a href="how-it-works.html">How It Works</a>
        <a href="add-a-spot.html">Add a Spot</a>
      </nav>

      <div class="header-actions">
        <a class="nav-auth-link" href="sign-in.html">Sign in</a>
        <a class="primary-button compact" href="sign-up.html">Sign up</a>
      </div>
    </header>

    <main class="page-main">
      <section class="map-page-layout">
        <aside class="map-filter-card">
          <h2>Map filters</h2>
          <label class="search-field compact-search" for="map-search">
            <span class="sr-only">Search the map</span>
            <input id="map-search" type="search" placeholder="Search the map...">
          </label>
          <div class="chip-filter-row compact" id="map-moods"></div>
          <div class="filter-stack">
            <select id="map-filter-tag" aria-label="Filter map by tag">
              <option value="">All tags</option>
              <option value="overhyped">Overhyped</option>
              <option value="hidden-gem">Hidden Gem</option>
              <option value="worth-it">Worth It</option>
            </select>
            <select id="map-filter-area" aria-label="Filter map by area">
              <option value="">All areas</option>
            </select>
            <select id="map-filter-cuisine" aria-label="Filter map by cuisine">
              <option value="">All cuisines</option>
            </select>
            <select id="map-filter-budget" aria-label="Filter map by price">
              <option value="">Any price</option>
              <option value="budget">Budget</option>
              <option value="mid">Mid</option>
              <option value="premium">Premium</option>
            </select>
          </div>
          <div class="legend-block">
            <button class="legend-filter active" data-map-toggle="overhyped" type="button"><span class="legend-dot overhyped"></span> Overhyped <strong id="tag-count-overhyped">0</strong></button>
            <button class="legend-filter active" data-map-toggle="hidden-gem" type="button"><span class="legend-dot hidden-gem"></span> Hidden Gem <strong id="tag-count-hidden-gem">0</strong></button>
            <button class="legend-filter active" data-map-toggle="worth-it" type="button"><span class="legend-dot worth-it"></span> Worth It <strong id="tag-count-worth-it">0</strong></button>
          </div>
          <p class="map-note" id="map-page-summary">Showing Bangalore restaurants only. Zoom in to break clusters apart.</p>
          <div class="mini-results" id="map-preview-results"></div>
        </aside>

        <div class="map-full-surface">
          <div class="map-shell map-fullscreen" id="full-map" aria-label="Full-screen Bangalore restaurant map"></div>
        </div>
      </section>
    </main>

    <div class="toast-stack" id="toast-stack"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/zod@3.23.8/lib/index.umd.min.js"></script>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="restaurants-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
